<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">

<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap');

  :root{
    --bg-0:#E9EBEA;
    --bg-1:#F3F4F2;
    --plate:#FFFFFF;
    --line:#E4E2D9;
    --gold:#B08B3A;
    --gold-bright:#C9A14A;
    --gold-soft:rgba(176,139,58,0.10);
    --ink-0:#22252B;
    --ink-1:#5B5F68;
    --ink-2:#93979F;
    --wa:#25D366;
  }

  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}

  html,body{
    margin:0; padding:0;
    background:
      radial-gradient(120% 90% at 50% -10%, rgba(176,139,58,0.07), transparent 55%),
      linear-gradient(180deg, var(--bg-1), var(--bg-0) 75%);
    min-height:100vh;
    font-family:'Inter', -apple-system, sans-serif;
    color:var(--ink-0);
    display:flex; align-items:center; justify-content:center;
    padding:28px 16px;
  }

  .card{
    width:100%;
    max-width:380px;
    position:relative;
  }

  .plate{
    background:var(--plate);
    border:1px solid var(--line);
    border-radius:22px;
    padding:34px 26px 26px;
    text-align:center;
    position:relative;
    overflow:hidden;
    box-shadow:0 24px 48px -24px rgba(34,37,43,0.16), 0 2px 8px -2px rgba(34,37,43,0.06);
  }
  .plate::before{
    content:"";
    position:absolute; inset:0;
    background:linear-gradient(90deg, transparent, var(--gold-bright), transparent);
    height:2px; top:0;
    opacity:0.75;
  }

  .eyebrow{
    font-size:11px;
    letter-spacing:0.22em;
    text-transform:uppercase;
    color:var(--gold);
    font-weight:600;
    margin-bottom:14px;
  }

  h1{
    font-family:'Playfair Display', serif;
    font-weight:600;
    font-size:26px;
    line-height:1.15;
    margin:0 0 8px;
    color:var(--ink-0);
    letter-spacing:0.01em;
  }

  .role{
    font-size:13.5px;
    color:var(--ink-1);
    font-weight:500;
    margin-bottom:22px;
    letter-spacing:0.01em;
  }

  .divider{
    width:36px; height:1px;
    background:var(--gold-bright);
    opacity:0.7;
    margin:0 auto 22px;
  }

  .save-btn{
    display:flex; align-items:center; justify-content:center; gap:9px;
    width:100%;
    padding:14px 18px;
    background:var(--ink-0);
    color:#F5F3EC;
    border:none;
    border-radius:13px;
    font-family:'Inter', sans-serif;
    font-weight:700;
    font-size:14.5px;
    letter-spacing:0.01em;
    cursor:pointer;
    margin-bottom:24px;
    box-shadow:0 10px 22px -10px rgba(34,37,43,0.45);
    transition:transform 0.15s ease, box-shadow 0.15s ease;
  }
  .save-btn:active{ transform:scale(0.97); box-shadow:0 4px 12px -6px rgba(34,37,43,0.4); }
  .save-btn svg{ width:17px; height:17px; flex-shrink:0; color:var(--gold-bright); }

  .links{
    display:flex; flex-direction:column; gap:10px;
    text-align:left;
  }

  .link-row{
    display:flex; align-items:center; gap:13px;
    padding:12px 14px;
    background:#FBFAF7;
    border:1px solid var(--line);
    border-radius:13px;
    text-decoration:none;
    color:var(--ink-0);
    transition:background 0.15s ease, border-color 0.15s ease;
  }
  .link-row:active{ background:#F3F1EA; }

  .icon{
    width:34px; height:34px;
    border-radius:9px;
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0;
    background:var(--gold-soft);
  }
  .icon svg{ width:17px; height:17px; }

  .link-text{ flex:1; min-width:0; }
  .link-label{
    font-size:10.5px;
    text-transform:uppercase;
    letter-spacing:0.09em;
    color:var(--ink-2);
    font-weight:600;
    margin-bottom:2px;
  }
  .link-value{
    font-size:13.5px;
    font-weight:500;
    color:var(--ink-0);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .chevron{ width:14px; height:14px; color:var(--ink-2); flex-shrink:0; }

  .footer{
    text-align:center;
    margin-top:26px;
    font-size:10.5px;
    color:var(--ink-2);
    letter-spacing:0.03em;
  }
  .footer a{ color:var(--ink-2); text-decoration:none; }

  @media (prefers-reduced-motion: reduce){
    .save-btn{ transition:none; }
  }
</style>

<script>
function salvarContato(){
  const vcard = [
    'BEGIN:VCARD',
    'VERSION:3.0',
    'N:Rocha;José Roberto;;;',
    'FN:José Roberto Rocha',
    'ORG:FS Tatuí',
    'TITLE:Analista de Infraestrutura e Tecnologia',
    'TEL;TYPE=CELL:+5515996133664',
    'EMAIL;TYPE=INTERNET:jose.rocha@fstatui.com.br',
    'URL:https://fstatui.com.br',
    'END:VCARD'
  ].join('\r\n');

  const blob = new Blob([vcard], { type: 'text/vcard;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'Jose-Roberto-Rocha-FS-Tatui.vcf';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
